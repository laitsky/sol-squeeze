<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sol Squeeze social card</title>
  <desc id="desc">Branded social preview with Sol Squeeze logo and the message Sell and Burn Solana Dust to SOL</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="58%" stop-color="#1c1c1c" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <radialGradient id="orangeGlow" cx="90%" cy="8%" r="70%">
      <stop offset="0%" stop-color="rgba(240,120,0,0.32)" />
      <stop offset="100%" stop-color="rgba(240,120,0,0)" />
    </radialGradient>
    <radialGradient id="whiteGlow" cx="8%" cy="96%" r="56%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.13)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="6" height="630" fill="#f07800" />
  <circle cx="1020" cy="64" r="280" fill="#f07800" opacity="0.17" filter="url(#soft)" />
  <circle cx="46" cy="604" r="220" fill="#ffffff" opacity="0.08" filter="url(#soft)" />
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="rgba(240,120,0,0.28)" stroke-width="2" />

  <g transform="translate(78 138)">
    <rect x="0" y="0" width="118" height="118" fill="rgba(255,255,255,0.03)" stroke="rgba(240,120,0,0.32)" stroke-width="2" />
    <text
      x="59"
      y="82"
      text-anchor="middle"
      fill="#f3f3f3"
      font-family="Baskerville, Georgia, 'Times New Roman', serif"
      font-style="italic"
      font-size="78"
      letter-spacing="-18"
    >SS</text>
  </g>

  <text
    x="222"
    y="214"
    fill="rgba(237,237,237,0.9)"
    font-family="Baskerville, Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="52"
  >Sol Squeeze</text>

  <text x="78" y="332" fill="#f07800" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="22" letter-spacing="7">SELL + BURN</text>
  <text
    x="78"
    y="424"
    fill="#ededed"
    font-family="Baskerville, Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="88"
  >Solana Dust</text>
  <text
    x="78"
    y="506"
    fill="#ededed"
    font-family="Baskerville, Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="88"
  >to SOL</text>

  <rect x="78" y="536" width="180" height="2" fill="rgba(240,120,0,0.36)" />
  <text
    x="78"
    y="576"
    fill="rgba(237,237,237,0.66)"
    font-family="Menlo, Monaco, 'Courier New', monospace"
    font-size="22"
  >Batch clean your wallet and reclaim SOL.</text>

  <text
    x="1094"
    y="578"
    text-anchor="end"
    fill="rgba(237,237,237,0.55)"
    font-family="Menlo, Monaco, 'Courier New', monospace"
    font-size="18"
  >solsqueeze.app</text>
  <circle cx="936" cy="571" r="5" fill="#f07800" />
</svg>
